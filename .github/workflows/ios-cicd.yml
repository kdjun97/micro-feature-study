name: iOS CI/CD

on:
  push:
    tags:
      - "dev/**"
      - "prod/**"
      - "demo/**"

jobs:
  cicd-start:
    name: CI/CD Start
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment tag
        id: validate-tag
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: ci_scripts/github/pre-build/validate_deployment_tag.sh

      - name: Define CI/CD environment
        id: define-cicd-environment
        run: ci_scripts/github/pre-build/define_cicd_environment.sh

      - name: Send Discord start notification
        if: steps.define-cicd-environment.outcome == 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ci_scripts/github/webhook/send_discord.sh \
            --status started \
            --message "CI/CD started" \
            --step workflow-start

      - name: Setup XCConfig
        id: setup-xcconfig
        if: steps.define-cicd-environment.outcome == 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          API_BASE_URL_DEV: ${{ secrets.API_BASE_URL_DEV }}
          API_BASE_URL_PROD: ${{ secrets.API_BASE_URL_PROD }}
        run: ci_scripts/github/pre-build/setup_xcconfig.sh

      - name: Setup Firebase
        id: setup-firebase
        if: steps.setup-xcconfig.outcome == 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FIREBASE_API_KEY_DEV: ${{ secrets.FIREBASE_API_KEY_DEV }}
          FIREBASE_API_KEY_PROD: ${{ secrets.FIREBASE_API_KEY_PROD }}
          FIREBASE_GOOGLE_APP_ID_DEV: ${{ secrets.FIREBASE_GOOGLE_APP_ID_DEV }}
          FIREBASE_GOOGLE_APP_ID_PROD: ${{ secrets.FIREBASE_GOOGLE_APP_ID_PROD }}
          FIREBASE_GCM_SENDER_ID_DEV: ${{ secrets.FIREBASE_GCM_SENDER_ID_DEV }}
          FIREBASE_GCM_SENDER_ID_PROD: ${{ secrets.FIREBASE_GCM_SENDER_ID_PROD }}
          FIREBASE_PROJECT_ID_DEV: ${{ secrets.FIREBASE_PROJECT_ID_DEV }}
          FIREBASE_PROJECT_ID_PROD: ${{ secrets.FIREBASE_PROJECT_ID_PROD }}
          FIREBASE_STORAGE_BUCKET_DEV: ${{ secrets.FIREBASE_STORAGE_BUCKET_DEV }}
          FIREBASE_STORAGE_BUCKET_PROD: ${{ secrets.FIREBASE_STORAGE_BUCKET_PROD }}
          FIREBASE_BUNDLE_ID_DEV: ${{ secrets.FIREBASE_BUNDLE_ID_DEV }}
          FIREBASE_BUNDLE_ID_PROD: ${{ secrets.FIREBASE_BUNDLE_ID_PROD }}
        run: ci_scripts/github/pre-build/setup_firebase.sh

      - name: Setup Tuist
        id: setup-tuist
        if: steps.setup-firebase.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ci_scripts/github/pre-build/setup_tuist.sh

      - name: Send Tuist setup failure notification
        if: steps.setup-tuist.outcome == 'failure'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ci_scripts/github/webhook/send_discord.sh \
            --status failure \
            --message "Tuist 설정에 실패했어요" \
            --step setup-tuist

      - name: Send Tuist setup success notification
        if: steps.setup-tuist.outcome == 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          echo "Tuist 설정 성공"
          ci_scripts/github/webhook/send_discord.sh \
            --status success \
            --message "Tuist 설정 성공" \
            --step setup-tuist

      - name: Stop on Tuist setup failure
        if: steps.setup-tuist.outcome == 'failure'
        run: exit 1
